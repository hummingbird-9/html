<!DOCTYPE html>
<html lang="en-us">

<head>
    <base href="https://cdn.jsdelivr.net/gh/aukak/hollow-knight@2fc2e7149f0d5b2609b135ab48f00fd973930635/">
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity WebGL Player | Hollow Knight</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap');

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #231F20;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        #loading-text {
            color: white;
            font-size: 48px;
            font-family: 'EB Garamond', Arial, serif;
            text-align: center;
            margin-top: 20px;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #231F20;
        }

        /* --- Debug console, fps viewer and instructions styles --- */

        #instruction-text {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 16px;
            z-index: 1000;
            display: none;
        }

        #dev-console {
            position: absolute;
            top: 0;
            right: 0;
            min-width: 200px;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
            z-index: 999;
            display: none;
        }

        #dev-console-header {
            color: #fff;
            border-bottom: 1px solid #333;
            padding: 5px 10px;
            margin-bottom: 5px;
            cursor: grab;
            box-sizing: border-box;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.8);
        }

        #dev-console-output {
            height: calc(100% - 25px);
            overflow-y: scroll;
            padding: 5px 10px;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #fps-viewer {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 3px;
            z-index: 998;
            display: none;
            cursor: grab;
        }

        .resizer {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: absolute;
            z-index: 10000;
        }

        .resizer.nw {
            width: 10px;
            height: 10px;
            top: -5px;
            left: -5px;
            cursor: nw-resize;
        }

        .resizer.ne {
            width: 10px;
            height: 10px;
            top: -5px;
            right: -5px;
            cursor: ne-resize;
        }

        .resizer.se {
            width: 10px;
            height: 10px;
            bottom: -5px;
            right: -5px;
            cursor: se-resize;
        }

        .resizer.sw {
            width: 10px;
            height: 10px;
            bottom: -5px;
            left: -5px;
            cursor: sw-resize;
        }

        .resizer.n {
            width: calc(100% - 10px);
            height: 5px;
            top: -3px;
            left: 5px;
            cursor: n-resize;
        }

        .resizer.s {
            width: calc(100% - 10px);
            height: 5px;
            bottom: -3px;
            left: 5px;
            cursor: s-resize;
        }

        .resizer.e {
            width: 5px;
            height: calc(100% - 10px);
            top: 5px;
            right: -3px;
            cursor: e-resize;
        }

        .resizer.w {
            width: 5px;
            height: calc(100% - 10px);
            top: 5px;
            left: -3px;
            cursor: w-resize;
        }

        #console-settings-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.9);
            color: white;
            padding: 20px;
            border-radius: 8px;
            z-index: 10001;
            display: none;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            font-family: sans-serif;
            min-width: 300px;
        }

        #console-settings-ui h3 {
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
        }

        #console-settings-ui label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        #console-settings-ui input[type="color"] {
            width: 60px;
            height: 25px;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        #console-settings-ui input[type="range"] {
            flex-grow: 1;
            margin-left: 10px;
        }

        #console-settings-ui button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }

        #console-settings-ui button:hover {
            background-color: #777;
        }
    </style>
</head>

<body>
    <div id="loading-text">
        LOADING...
    </div>
    <div hidden id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-mobile-warning"> WebGL builds are not supported on mobile devices. </div>
    </div>

    <div id="instruction-text">
        Press '1' to toggle console, Press '2' to toggle FPS
    </div>

    <div id="dev-console">
        <div id="dev-console-header">
            Developer Console
            <span id="console-settings-icon" style="cursor: pointer; margin-left: auto;">
                <img src="https://icon-icons.com/download-file?file=https%3A%2F%2Fimages.icon-icons.com%2F685%2FPNG%2F512%2Fsettings_icon-icons.com_61211.png&id=61211&pack_or_individual=pack" alt="Settings" style="width: 1.2em; height: 1.2em; vertical-align: middle;">
            </span>
        </div>
        <div id="dev-console-output"></div>
    </div>

    <div id="fps-viewer">
        FPS: <span id="fps-value">0</span>
    </div>

    <div id="console-settings-ui">
        <h3>Console Settings</h3>
        <label>Background Color: <input type="color" id="setting-bg-color" value="#000000"></label>
        <label>Header Color: <input type="color" id="setting-header-color" value="#000000"></label>
        <label>Opacity: <input type="range" id="setting-opacity" min="0.1" max="1" step="0.05" value="0.8"></label>
        <span id="opacity-value" style="margin-left: 10px;">80%</span>
        <label>Log Text Color: <input type="color" id="setting-log-color" value="#00ff00"></label>
        <label>Warn Text Color: <input type="color" id="setting-warn-color" value="#ffff00"></label>
        <label>Error Text Color: <input type="color" id="setting-error-color" value="#ff0000"></label>
        <button id="close-settings-btn">Close</button>
    </div>

    <script>
        // IndexedDB cache script
        const DB_NAME = "cachedb";
        const STORE_NAME = "files";

        function openCacheDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function saveToCache(key, blob) {
            const db = await openCacheDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).put(blob, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function loadFromCache(key) {
            const db = await openCacheDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const req = tx.objectStore(STORE_NAME).get(key);
                req.onsuccess = () => resolve(req.result || null);
                req.onerror = () => reject(req.error);
            });
        }

        async function deleteFromCache(key) {
            const db = await openCacheDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).delete(key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // --- Drag and Resize Helpers ---
        function makeDraggable(element, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const dragHandle = handle || element;

            dragHandle.onmousedown = dragMouseDown;
            dragHandle.style.cursor = 'grab';

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                dragHandle.style.cursor = 'grabbing';
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                dragHandle.style.cursor = 'grab';
            }
        }

        function makeResizable(element, minWidth, minHeight) {
            const resizeHandles = ['nw', 'ne', 'se', 'sw', 'n', 's', 'e', 'w'];

            resizeHandles.forEach(direction => {
                const resizer = document.createElement('div');
                resizer.className = `resizer ${direction}`;
                element.appendChild(resizer);

                let currentResizer;

                resizer.addEventListener('mousedown', function (e) {
                    currentResizer = resizer;
                    e.preventDefault();
                    let startX = e.clientX;
                    let startY = e.clientY;
                    let startWidth = parseInt(document.defaultView.getComputedStyle(element).width, 10);
                    let startHeight = parseInt(document.defaultView.getComputedStyle(element).height, 10);
                    let startLeft = element.offsetLeft;
                    let startTop = element.offsetTop;

                    function doDrag(e) {
                        let newWidth = startWidth;
                        let newHeight = startHeight;
                        let newLeft = startLeft;
                        let newTop = startTop;

                        switch (currentResizer.classList[1]) {
                            case 'se':
                                newWidth = startWidth + (e.clientX - startX);
                                newHeight = startHeight + (e.clientY - startY);
                                break;
                            case 'sw':
                                newWidth = startWidth - (e.clientX - startX);
                                newHeight = startHeight + (e.clientY - startY);
                                newLeft = startLeft + (e.clientX - startX);
                                break;
                            case 'ne':
                                newWidth = startWidth + (e.clientX - startX);
                                newHeight = startHeight - (e.clientY - startY);
                                newTop = startTop + (e.clientY - startY);
                                break;
                            case 'nw':
                                newWidth = startWidth - (e.clientX - startX);
                                newHeight = startHeight - (e.clientY - startY);
                                newLeft = startLeft + (e.clientX - startX);
                                newTop = startTop + (e.clientY - startY);
                                break;
                            case 'n':
                                newHeight = startHeight - (e.clientY - startY);
                                newTop = startTop + (e.clientY - startY);
                                break;
                            case 's':
                                newHeight = startHeight + (e.clientY - startY);
                                break;
                            case 'e':
                                newWidth = startWidth + (e.clientX - startX);
                                break;
                            case 'w':
                                newWidth = startWidth - (e.clientX - startX);
                                newLeft = startLeft + (e.clientX - startX);
                                break;
                        }

                        element.style.width = Math.max(minWidth, newWidth) + 'px';
                        element.style.height = Math.max(minHeight, newHeight) + 'px';
                        element.style.left = newLeft + 'px';
                        element.style.top = newTop + 'px';
                    }

                    function stopDrag() {
                        document.removeEventListener('mousemove', doDrag);
                        document.removeEventListener('mouseup', stopDrag);
                        currentResizer = null;
                    }

                    document.addEventListener('mousemove', doDrag);
                    document.addEventListener('mouseup', stopDrag);
                });
            });

            if (!element.style.width) element.style.width = '400px';
            if (!element.style.height) element.style.height = '200px';
            element.style.position = 'absolute';
        }
        // --- End Drag and Resize ---

        // Hex to RGBA helper
        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length === 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Console settings with default colors
        let consoleSettings = {
            bgColor: '#000000',
            headerColor: '#000000',
            opacity: 0.8,
            logColor: '#00ff00',
            warnColor: '#ffff00',
            errorColor: '#ff0000'
        };

        let loadingText = document.querySelector("#loading-text");
        let loadedBytes = 0;

        // New elements references
        let instructionText = document.querySelector("#instruction-text");
        let devConsole = document.querySelector("#dev-console");
        let devConsoleHeader = document.querySelector("#dev-console-header");
        let devConsoleOutput = document.querySelector("#dev-console-output");
        let fpsViewer = document.querySelector("#fps-viewer");
        let fpsValue = document.querySelector("#fps-value");

        let consoleSettingsUI = document.querySelector("#console-settings-ui");
        let settingBgColor = document.getElementById("setting-bg-color");
        let settingHeaderColor = document.getElementById("setting-header-color");
        let settingOpacity = document.getElementById("setting-opacity");
        let opacityValueSpan = document.getElementById("opacity-value");
        let settingLogColor = document.getElementById("setting-log-color");
        let settingWarnColor = document.getElementById("setting-warn-color");
        let settingErrorColor = document.getElementById("setting-error-color");
        let consoleSettingsIcon = document.getElementById("console-settings-icon");
        let closeSettingsBtn = document.getElementById("close-settings-btn");

        // Wrap console methods to capture logs
        const originalConsoleLog = console.log;
        const originalConsoleWarn = console.warn;
        const originalConsoleError = console.error;
        let consoleVisible = false;

        function loadConsoleSettings() {
            const savedSettings = localStorage.getItem('devConsoleSettings');
            if (savedSettings) {
                Object.assign(consoleSettings, JSON.parse(savedSettings));
            }
        }

        function applyConsoleSettings() {
            devConsole.style.backgroundColor = hexToRgba(consoleSettings.bgColor, consoleSettings.opacity);
            devConsoleHeader.style.backgroundColor = hexToRgba(consoleSettings.headerColor, consoleSettings.opacity);

            settingBgColor.value = consoleSettings.bgColor;
            settingHeaderColor.value = consoleSettings.headerColor;
            settingOpacity.value = consoleSettings.opacity;
            opacityValueSpan.textContent = `${Math.round(consoleSettings.opacity * 100)}%`;
            settingLogColor.value = consoleSettings.logColor;
            settingWarnColor.value = consoleSettings.warnColor;
            settingErrorColor.value = consoleSettings.errorColor;

            Array.from(devConsoleOutput.children).forEach(logEntry => {
                const type = logEntry.dataset.logType;
                if (type === 'log') logEntry.style.color = consoleSettings.logColor;
                else if (type === 'warn') logEntry.style.color = consoleSettings.warnColor;
                else if (type === 'error') logEntry.style.color = consoleSettings.errorColor;
            });
        }

        function saveConsoleSettings() {
            localStorage.setItem('devConsoleSettings', JSON.stringify(consoleSettings));
        }

        function toggleConsoleSettingsUI() {
            if (consoleSettingsUI.style.display === 'block') {
                consoleSettingsUI.style.display = 'none';
                saveConsoleSettings();
            } else {
                consoleSettingsUI.style.display = 'block';
                applyConsoleSettings();
            }
        }

        function appendToConsole(message, type = 'log') {
            const logEntry = document.createElement('div');
            logEntry.style.marginBottom = '2px';
            logEntry.style.wordBreak = 'break-all';
            logEntry.style.whiteSpace = 'pre-wrap';
            logEntry.dataset.logType = type;

            let color = consoleSettings.logColor;
            if (type === 'warn') color = consoleSettings.warnColor;
            else if (type === 'error') color = consoleSettings.errorColor;
            logEntry.style.color = color;

            let formattedMessage = Array.from(message).map(arg => {
                if (typeof arg === 'object' && arg !== null) {
                    try {
                        return JSON.stringify(arg, null, 2);
                    } catch (e) {
                        return String(arg);
                    }
                }
                return String(arg);
            }).join(' ');

            logEntry.textContent = formattedMessage;
            devConsoleOutput.appendChild(logEntry);
            if (consoleVisible) {
                devConsoleOutput.scrollTop = devConsoleOutput.scrollHeight;
            }
        }

        console.log = function (...args) {
            originalConsoleLog.apply(console, args);
            appendToConsole(args, 'log');
        };
        console.warn = function (...args) {
            originalConsoleWarn.apply(console, args);
            appendToConsole(args, 'warn');
        };
        console.error = function (...args) {
            originalConsoleError.apply(console, args);
            appendToConsole(args, 'error');
        };

        function toggleConsole() {
            consoleVisible = !consoleVisible;
            devConsole.style.display = consoleVisible ? 'block' : 'none';
            if (consoleVisible) {
                devConsoleOutput.scrollTop = devConsoleOutput.scrollHeight;
            }
        }

        // FPS Viewer
        let fpsVisible = false;
        let lastFrameTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        function calculateFps() {
            const now = performance.now();
            frameCount++;
            const delta = now - lastFrameTime;
            if (delta >= 1000) {
                fps = Math.round((frameCount * 1000) / delta);
                if (fpsVisible) {
                    fpsValue.textContent = fps;
                }
                frameCount = 0;
                lastFrameTime = now;
            }
            requestAnimationFrame(calculateFps);
        }

        function toggleFpsViewer() {
            fpsVisible = !fpsVisible;
            fpsViewer.style.display = fpsVisible ? 'block' : 'none';
        }

        requestAnimationFrame(calculateFps);

        // Initialize drag and resize for dev console and fps viewer
        makeDraggable(devConsole, devConsoleHeader);
        makeResizable(devConsole, 200, 100);
        makeDraggable(fpsViewer, fpsViewer);

        consoleSettingsIcon.addEventListener('click', toggleConsoleSettingsUI);
        closeSettingsBtn.addEventListener('click', toggleConsoleSettingsUI);

        settingBgColor.addEventListener('input', (e) => {
            consoleSettings.bgColor = e.target.value;
            applyConsoleSettings();
        });
        settingHeaderColor.addEventListener('input', (e) => {
            consoleSettings.headerColor = e.target.value;
            applyConsoleSettings();
        });
        settingOpacity.addEventListener('input', (e) => {
            consoleSettings.opacity = parseFloat(e.target.value);
            opacityValueSpan.textContent = `${Math.round(consoleSettings.opacity * 100)}%`;
            applyConsoleSettings();
        });
        settingLogColor.addEventListener('input', (e) => {
            consoleSettings.logColor = e.target.value;
            applyConsoleSettings();
        });
        settingWarnColor.addEventListener('input', (e) => {
            consoleSettings.warnColor = e.target.value;
            applyConsoleSettings();
        });
        settingErrorColor.addEventListener('input', (e) => {
            consoleSettings.errorColor = e.target.value;
            applyConsoleSettings();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === '1') {
                toggleConsole();
            } else if (event.key === '2') {
                toggleFpsViewer();
            }
        });

        loadConsoleSettings();
        applyConsoleSettings();

        // Fetch with progress showing loaded / total MB
        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            const chunks = [];
            let received = 0;
            const totalBytes = 912.81 * 1024 * 1024; // total in bytes approx
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                received += value.length;
                loadedBytes += value.length;
                const mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                const mbTotal = (totalBytes / (1024 * 1024)).toFixed(2);
                loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
            }
            const fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (const chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        async function mergeFiles(fileParts, cacheKey) {
            const cached = await loadFromCache(cacheKey);
            if (cached) {
                return URL.createObjectURL(cached);
            }
            const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
            const mergedBlob = new Blob(buffers);
            await saveToCache(cacheKey, mergedBlob);
            return URL.createObjectURL(mergedBlob);
        }

        function getParts(file, start, end) {
            const parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        (async () => {
            const [dataUrl, wasmUrl] = await Promise.all([
                mergeFiles(getParts("Build/hktruffled.data", 1, 45), "hktruffled.data"),
                mergeFiles(getParts("Build/hktruffled.wasm", 1, 2), "hktruffled.wasm"),
            ]);

            const buildUrl = "Build";
            const loaderUrl = `${buildUrl}/hktruffled.loader.js`;
            const config = {
                dataUrl: dataUrl,
                frameworkUrl: `${buildUrl}/hktruffled.framework.js`,
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Team Cherry & Truffled",
                productName: "Hollow Knight",
                productVersion: "1.1",
            };

            const container = document.querySelector("#unity-container");
            const canvas = document.querySelector("#unity-canvas");
            const loadingBar = document.querySelector("#unity-loading-bar");
            const progressBarFull = document.querySelector("#unity-progress-bar-full");
            const mobileWarning = document.querySelector("#unity-mobile-warning");

            container.hidden = false;

            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                container.className = "unity-mobile";
                config.devicePixelRatio = 1;
                mobileWarning.style.display = "block";
                setTimeout(() => {
                    mobileWarning.style.display = "none";
                }, 5000);
            } else {
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    canvas.style.width = `${window.innerWidth}px`;
                    canvas.style.height = `${window.innerHeight}px`;
                }
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
            }

            loadingBar.style.display = "block";

            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                }).then(() => {
                    loadingText.remove();
                    loadingBar.style.display = "none";
                    canvas.style.display = "block";

                    instructionText.style.display = "block";
                    setTimeout(() => {
                        instructionText.style.display = "none";
                    }, 5000);

                }).catch(async (message) => {
                    await deleteFromCache("hktruffled.wasm");
                    alert(message);
                });
            };
            document.body.appendChild(script);
        })();
    </script>
</body>

</html>
